name: LAMIS CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2️⃣ Install system dependencies for C extensions
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libpulse-dev \
            libffi-dev \
            libssl-dev \
            libbz2-dev \
            liblzma-dev \
            libsqlite3-dev \
            build-essential \
            python3-dev \
            cmake \
            pkg-config \
            ffmpeg \
            libopencv-dev \
            libsm6 \
            libxext6 \
            libxrender-dev

      # 3️⃣ Setup Python 3.11
      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 4️⃣ Upgrade pip and install Python dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      # 5️⃣ Run unit tests
      - name: Run tests
        run: |
          pytest --maxfail=1 --disable-warnings -q

      # 6️⃣ Build Python package
      - name: Build package
        run: python setup.py sdist bdist_wheel

      # 7️⃣ Optional Docker build
      - name: Build Docker image
        run: docker build -t lamis:latest .

      # 8️⃣ Optional deployment
      - name: Deploy to server
        if: github.ref == 'refs/heads/main'
        run: |
          scp -r ./dist user@server:/path/to/deploy/
          ssh user@server 'systemctl restart lamis.service'

      # 9️⃣ Notify success
      - name: Success Message
        run: echo "LAMIS CI/CD workflow completed successfully!"
